name: CI & Release

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci-pipeline:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: s4-server
            asset_name: s4-server-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: s4-server.exe
            asset_name: s4-server-windows-x86_64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Проверки запускаем только на Linux, чтобы не дублировать работу
      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: Run clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets
        timeout-minutes: 30

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.asset_name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 5

  release:
    name: Create Release & Docker
    needs: ci-pipeline
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts

      - name: Package assets
        run: |
          mkdir -p release_assets
          # Linux
          cp all_artifacts/s4-server-linux-x86_64/s4-server-linux-x86_64 release_assets/
          chmod +x release_assets/s4-server-linux-x86_64
          tar -czf s4-server-linux-x86_64.tar.gz -C release_assets s4-server-linux-x86_64
          # Windows
          cp all_artifacts/s4-server-windows-x86_64.exe/s4-server-windows-x86_64.exe release_assets/
          zip -j s4-server-windows-x86_64.zip release_assets/s4-server-windows-x86_64.exe
          # Checksums
          sha256sum s4-server-linux-x86_64.tar.gz > s4-server-linux-x86_64.tar.gz.sha256
          sha256sum s4-server-windows-x86_64.zip > s4-server-windows-x86_64.zip.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            s4-server-linux-x86_64.tar.gz
            s4-server-linux-x86_64.tar.gz.sha256
            s4-server-windows-x86_64.zip
            s4-server-windows-x86_64.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Docker остается без изменений (собирается под Linux)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
