name: Fork Build & Release

on:
  push:
    branches: [main, develop]
  workflow_dispatch: # Позволяет запустить сборку вручную

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: s4-server
            asset_name: s4-server-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: s4-server.exe
            asset_name: s4-server-windows.exe

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Важно для создания релиза
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts

      - name: Prepare Files
        run: |
          mkdir -p publish
          cp all_artifacts/s4-server-linux/s4-server publish/s4-server-linux
          cp all_artifacts/s4-server-windows.exe/s4-server.exe publish/s4-server-windows.exe
          chmod +x publish/s4-server-linux

      - name: Release Latest
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Automated Build
          body: "Автоматическая сборка для Linux и Windows (ветка ${{ github.ref_name }})"
          files: |
            publish/s4-server-linux
            publish/s4-server-windows.exe
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
